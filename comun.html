<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/comun.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a class="navbar-brand" href="./index.html">
                    <img src="https://vectorseek.com/wp-content/uploads/2023/10/Bilhete-Unico-Logo-Vector.svg-.png"
                        alt="Logo Bilhete Único" />
                </a>

                <!-- BOTÃO HAMBÚRGUER (aparece só no mobile) -->
                <button class="navbar-toggler" id="navbar-toggler" aria-expanded="false" aria-label="Abrir menu">
                    &#9776;
                </button>

                <div class="nav-links" id="navLinks">
                    <a href="#">Bilhetes</a>
                    <a href="#">Ajuda</a>
                    <a class="btn-login" href="#">ÁREA DO USUÁRIO</a>
                </div>
            </div>
        </nav>

    <footer>
        <div class="container footer-grid">
            <div class="footer-col">

            </div>
            <div class="footer-col right">
                <h5 class="footer-title">Acessibilidade</h5>
                <div class="footer-icons">
                    <i class="bi bi-universal-access"></i>

        <div class="footer-bottom">
            <p>© 2026 SPTrans. O Transporte que move São Paulo.</p>
